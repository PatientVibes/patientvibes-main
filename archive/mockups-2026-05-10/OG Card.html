<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>patientvibes — OG card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system/tokens.css">
<link rel="stylesheet" href="design-system/base.css">
<style>
  html, body { background: #2a2a2a; }
  .stage { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
  .og {
    width: 1200px; height: 630px;
    background: var(--pv-bg);
    color: var(--pv-ink);
    padding: 72px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .og::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(600px 320px at 92% 8%, rgba(63,107,84,.10), transparent 60%),
      repeating-linear-gradient(0deg, transparent 0 39px, rgba(17,37,28,.04) 39px 40px);
    pointer-events: none;
  }
  .og__top { display: flex; justify-content: space-between; align-items: center; position: relative; }
  .og__brand { display: flex; align-items: center; gap: 16px; }
  .og__brand .glyph {
    width: 48px; height: 48px;
    border: 1.6px solid var(--pv-sage); color: var(--pv-sage);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font: italic 22px/1 var(--pv-font-serif);
  }
  .og__brand .name { font: 400 30px/1 var(--pv-font-serif); letter-spacing: var(--pv-track-tight); }
  .og__tag { font: 400 13px/1 var(--pv-font-mono); text-transform: uppercase; letter-spacing: var(--pv-track-eyebrow); color: var(--pv-mute); }
  .og__title {
    font-family: var(--pv-font-serif); font-weight: 400;
    font-size: 132px; line-height: .92; letter-spacing: var(--pv-track-display);
    align-self: center; max-width: 14ch; position: relative;
  }
  .og__title em { font-style: italic; color: var(--pv-sage); }
  .og__bottom { display: flex; justify-content: space-between; align-items: flex-end; position: relative; }
  .og__chips { display: flex; gap: 10px; }
  .og__chip {
    padding: 7px 14px; border: 1px solid var(--pv-line); border-radius: 999px;
    background: var(--pv-paper); color: var(--pv-ink-2);
    font: 400 14px/1 var(--pv-font-mono);
  }
  .og__chip i { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--pv-sage); margin-right: 8px; vertical-align: 1px; box-shadow: 0 0 0 3px var(--pv-sage-tint); }
  .og__url { font: 400 14px/1 var(--pv-font-mono); color: var(--pv-ink); text-transform: lowercase; letter-spacing: var(--pv-track-eyebrow); }
  .og__rule { position: absolute; left: 72px; right: 72px; top: 144px; height: 1px; background: var(--pv-ink); }
</style>
</head>
<body>
<div class="stage">
  <div class="og">
    <div class="og__top">
      <div class="og__brand">
        <span class="glyph">pv</span>
        <span class="name">patientvibes</span>
      </div>
      <span class="og__tag">Index · agents · workshop</span>
    </div>
    <div class="og__rule"></div>
    <h1 class="og__title">A workshop for <em>patient</em> things.</h1>
    <div class="og__bottom">
      <div class="og__chips">
        <span class="og__chip"><i></i>1 harness · 8 tools · 1 skill</span>
        <span class="og__chip">esp32 · 3d-print</span>
      </div>
      <span class="og__url">patientvibes.io</span>
    </div>
  </div>
</div>
</body>
</html>
